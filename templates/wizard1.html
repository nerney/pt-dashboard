{{ define "content" }}
<div class="wizard-shell">
  <header class="wizard-header">
    <span class="brand-mark">UNIT3D</span>
    <span class="brand-sep">—</span>
    <span class="brand-sub">TRACKER DASHBOARD</span>
  </header>

  <div class="wizard-rule"></div>

  <div class="wizard-body">
    <div class="wizard-step-indicator">
      <span class="step active">01</span>
      <span class="step-line">────</span>
      <span class="step">02</span>
      <span class="step-line">────</span>
      <span class="step">03</span>
    </div>

    <h1 class="wizard-title">Connect Prowlarr</h1>
    <p class="wizard-desc">
      Prowlarr manages your indexers. Enter your instance URL and API key
      to load your UNIT3D tracker definitions.
    </p>

    {{ if .Error }}
    <div class="form-error">
      <span class="error-dot">●</span>
      {{ .Error }}
    </div>
    {{ end }}

    <form method="POST" action="/wizard/1" class="wizard-form">
      <div class="field">
        <label class="field-label" for="url">PROWLARR URL</label>
        <input
          class="field-input"
          type="url"
          id="url"
          name="url"
          value="{{ .URL }}"
          placeholder="http://prowlarr:9696"
          autocomplete="off"
          required
        >
      </div>

      <div class="field">
        <label class="field-label" for="api_key">API KEY</label>
        <input
          class="field-input"
          type="password"
          id="api_key"
          name="api_key"
          value="{{ .APIKey }}"
          placeholder="your Prowlarr API key"
          autocomplete="off"
          required
        >
      </div>

      <div class="wizard-actions">
        <button type="submit" class="btn-primary">
          <span class="btn-label">CONTINUE</span>
          <span class="btn-arrow">→</span>
        </button>
      </div>
    </form>
  </div>
</div>
{{ end }}
